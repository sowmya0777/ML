<!DOCTYPE html>
<html>
<head>
    <title>Credit Risk Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Credit Default Risk Prediction</h1>

    <form action="/predict" method="post">
        <input type="text" name="income" placeholder="Income" required>
        <input type="text" name="loan" placeholder="Loan Amount" required>
        <input type="text" name="credit_score" placeholder="Credit Score" required>

        <button type="submit">Predict</button>
    </form>
</body>
</html>
